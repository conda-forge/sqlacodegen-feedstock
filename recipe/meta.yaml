{% set name = "sqlacodegen" %}
{% set version = "4.0.3" %}
{% set sha256 = "7e696456e85a1d9e0b1841b685d667e1a18ab0a5318788929f4ec3349393b45f" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  entry_points:
    - sqlacodegen = sqlacodegen.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=64
    - setuptools_scm >=6.4
  run:
    - python >={{ python_min }}
    - inflect >=4.0.0
    - sqlalchemy >=2.0.29
  run_constrained:
    - geoalchemy2 >=0.17.0
    - sqlmodel >=0.0.22
    - sqlalchemy-citext >=1.7.0
    - pgvector >=0.2.4

test:
  requires:
    - python {{ python_min }}
  imports:
    - sqlacodegen
  commands:
    - sqlacodegen --help

about:
  home: http://pypi.python.org/pypi/sqlacodegen/
  license: MIT
  license_file: LICENSE
  summary: Automatic model code generator for SQLAlchemy
  license_family: MIT

extra:
  recipe-maintainers:
    - rzillman
    - dhirschfeld
